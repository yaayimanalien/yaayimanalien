<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Footer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .footer {
      background-color: #808080; /* Gray background */
      color: white;
      padding: 40px 0;
    }
    .footer a {
      color: white;
      text-decoration: none;
      margin-right: 15px;
    }
    .footer a:hover {
      color: #d0d0d0;
    }
    .social-links .fab {
      font-size: 24px;
    }
    .rights-column {
      color: black;
      text-align: right;
    }
  </style>
</head>
<body>
  <footer class="footer">
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <div class="row mb-3">
            <div class="col">
              <div class="d-flex align-items-center">
                <i class="fas fa-envelope me-2"></i>
                <a href="mailto:designer@mail.lv">designer@mail.lv</a>
              </div>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col">
              <div class="d-flex align-items-center">
                <i class="fas fa-phone-alt me-2"></i>
                <a href="tel:+3711234567">+371 1234567</a>
              </div>
            </div>
          </div>
          <div class="row social-links">
            <div class="col text-center">
              <a href="https://linkedin.com" class="me-3"><i class="fab fa-linkedin"></i></a>
              <a href="https://instagram.com" class="me-3"><i class="fab fa-instagram"></i></a>
            </div>
          </div>
        </div>
        <div class="col-md-6 rights-column">
          <p class="mb-0">&copy; All rights reserved, 2024</p>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
