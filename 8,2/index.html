<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-container {
      max-width: 700px;
      min-width: 360px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container my-5">
    <div class="form-container">
      <h2 class="text-center mb-4">Registration Page</h2>
      <form>
        <!-- Name Field -->
        <div class="row align-items-center mb-3">
          <label for="name" class="col-md-4 col-form-label">Enter your name:<span class="text-danger">*</span></label>
          <div class="col-md-8">
            <input type="text" class="form-control form-control-sm" id="name" placeholder="Your name" required>
          </div>
        </div>

        <!-- Password Field -->
        <div class="row align-items-center mb-3">
          <label for="password" class="col-md-4 col-form-label">Enter your password:<span class="text-danger">*</span></label>
          <div class="col-md-8">
            <input type="password" class="form-control form-control-sm" id="password" placeholder="Password" required>
          </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="row align-items-center mb-3">
          <label for="confirm-password" class="col-md-4 col-form-label">Confirm your password:<span class="text-danger">*</span></label>
          <div class="col-md-8">
            <input type="password" class="form-control form-control-sm" id="confirm-password" placeholder="Confirm Password" required>
          </div>
        </div>

        <!-- Country Field -->
        <div class="row align-items-center mb-3">
          <label for="country" class="col-md-4 col-form-label">Country (optional):</label>
          <div class="col-md-8">
            <select class="form-select form-select-sm" id="country">
              <option>Latvia</option>
              <option>USA</option>
              <option>Canada</option>
            </select>
          </div>
        </div>

        <!-- Gender Field -->
        <div class="row mb-3">
          <label class="col-md-4 col-form-label">Specify your gender:</label>
          <div class="col-md-8">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="gender" id="male" value="Male">
              <label class="form-check-label" for="male">Male</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
              <label class="form-check-label" for="female">Female</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="gender" id="other" value="Other">
              <label class="form-check-label" for="other">Other</label>
            </div>
          </div>
        </div>

        <!-- Birthdate Field -->
        <div class="row align-items-center mb-3">
          <label for="birthdate" class="col-md-4 col-form-label">Enter your birth date (optional):</label>
          <div class="col-md-8">
            <input type="date" class="form-control form-control-sm" id="birthdate">
          </div>
        </div>

        <!-- Phone Field -->
        <div class="row align-items-center mb-3">
          <label for="phone" class="col-md-4 col-form-label">Enter your phone number:</label>
          <div class="col-md-8">
            <input type="tel" class="form-control form-control-sm" id="phone" placeholder="Phone number">
          </div>
        </div>

        <!-- Terms and Conditions -->
        <div class="row mb-3">
          <div class="col-md-4"></div>
          <div class="col-md-8">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms" required>
              <label class="form-check-label" for="terms">
                I agree to the terms:<span class="text-danger">*</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="row">
          <div class="col-12 d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
          </div>
        </div>        
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
