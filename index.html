      .flex-container {
        display: flex;
        flex-direction: column;

        align-items: center;
        justify-content: center;
        height: fit-content;
      }

      .box {
        padding: 20px;
        background-color: #0073e655;
        text-align: center;
        border-radius: 5px;
        width: 100px;
        font-family: 'MinecraftSevenv4', 'monospace', 'Sans Serif', 'Helvetica', 'Arial';
        backdrop-filter: blur(5px);
      }

      a {
        color: white;
        font-family: sans-serif;
        text-decoration: none;
      }

      a:visited {
        color: white;
      }

      h2 {
        text-align: center;
        /* background-image: linear-gradient(135deg, #4f0fff 10%, #9ab4d5 45%, #c849ca 71%);

        background: linear-gradient(to right, #B7DEED 0%, #71CEEF 25%, #b66de7 75%, #b790e4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        box-shadow: inset;
        font-size: 50pt;
        width: 100%;

          /*
